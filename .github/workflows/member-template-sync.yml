name: Sync member issue template

on:
  push:
    branches:
      - main
    paths:
      - "_members/**"
      - "scripts/update_member_issue_template.py"
      - ".github/ISSUE_TEMPLATE/member-update.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-template:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Update member slug dropdown
        run: python3 scripts/update_member_issue_template.py

      - name: Commit template changes
        run: |
          if git diff --quiet -- .github/ISSUE_TEMPLATE/member-update.yml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/member-update.yml
          git commit -m "Sync member issue template"
          git push

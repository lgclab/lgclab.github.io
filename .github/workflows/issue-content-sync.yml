name: Sync issue content

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  sync:
    if: startsWith(github.event.issue.title, '[成员]') || startsWith(github.event.issue.title, '[经验贴]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync issue into content files
        run: python3 scripts/sync_issue_content.py --event "$GITHUB_EVENT_PATH" --comment-json issue-sync-comment.json

      - name: Commit content changes
        id: commit
        run: |
          if git diff --quiet -- _members _posts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _members _posts
          git commit -m "Sync issue #${{ github.event.issue.number }} content"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -sS \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/issues/${{ github.event.issue.number }}/comments" \
            --data @issue-sync-comment.json

---
layout: default
---

<article class="page">
  <header class="page-header">
    <p class="eyebrow">{{ page.kicker | default: site.description }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p class="lede">{{ page.summary }}</p>
    {% endif %}
  </header>

  {{ content }}
</article>

title: "廖总全🌍后援会"
lang: zh-CN
timezone: Asia/Shanghai
url: "https://lgclab.github.io"
baseurl: ""

permalink: /posts/:year/:month/:day/:title/

collections:
  members:
    output: true
    permalink: /members/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: members
    values:
      layout: member

exclude:
  - docs/superpowers/
  - tests/
  - README.md
  - CONTRIBUTING.md
